name: Build APKs

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Show disk space before cleanup
        run: df -h
        working-directory: .

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY/CodeQL"
        working-directory: .

      - name: Show disk space after cleanup
        run: df -h
        working-directory: .

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install required Android SDK components
        run: sdkmanager "ndk;29.0.13113456"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Install Dart and Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: chiron-release-unsigned
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-release-apk
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: chiron-release-unsigned
          path: release-artifacts/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-build-${{ github.run_id }}
          name: CI build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          body: |
            Automated APK build for commit `${{ github.sha }}`.

            Assets:
            - `app-release.apk` (unsigned)
          files: |
            release-artifacts/release/app-release.apk
